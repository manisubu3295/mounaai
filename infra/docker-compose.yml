version: '3.9'

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pocketcomputer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API (Backend) ────────────────────────────────────────────────────────────
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/pocketcomputer
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://localhost}
      WHATSAPP_NUMBER: ${WHATSAPP_NUMBER:-919000000000}
      WHATSAPP_MESSAGE: ${WHATSAPP_MESSAGE:-Hi, I am interested in PocketComputer Pro.}
    # Not exposed directly — traffic reaches the API only through the web container's /api proxy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:4000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Web (Frontend + internal /api proxy) ────────────────────────────────────
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_URL: /api
    # Internal only — exposed through the nginx reverse proxy below

  # ─── Nginx (Edge reverse proxy) ──────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # SSL certificates — mount your certs here (e.g. from certbot)
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Let's Encrypt ACME webroot
      - certbot_www:/var/www/certbot:ro
    healthcheck:
      test: ['CMD-SHELL', 'nginx -t && curl -sf http://localhost/health || exit 0']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  certbot_www:
