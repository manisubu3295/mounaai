user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uid=$upstream_http_x_request_id';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;   # hide nginx version

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # API: 10 requests/second per IP (burst to 20)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Static / web UI: 30 requests/second per IP (burst to 60)
    limit_req_zone $binary_remote_addr zone=web_limit:10m rate=30r/s;

    # ── Real IP (if behind a cloud LB/CDN) ───────────────────────────────────
    # Uncomment and set your load balancer's IP range if applicable:
    # set_real_ip_from  10.0.0.0/8;
    # real_ip_header    X-Forwarded-For;

    # ── Include server blocks ─────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
