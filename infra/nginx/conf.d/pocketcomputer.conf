# ─── Upstream ─────────────────────────────────────────────────────────────────
# The web container serves the React SPA and proxies /api to the API service
upstream pocketcomputer_web {
    server web:80;
    keepalive 16;
}

# ─── HTTP (default deployable mode) ───────────────────────────────────────────
# This server block keeps the stack deployable before TLS is configured.
# Once certificates are available, replace this block with the HTTPS example below.
server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt ACME challenge through without redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    include /etc/nginx/conf.d/common-headers.conf;
    include /etc/nginx/conf.d/proxy-rules.conf;
}

