# ─── Upstream ─────────────────────────────────────────────────────────────────
# The web container serves the React SPA and proxies /api to the API service
upstream pocketcomputer_web {
    server web:80;
    keepalive 16;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
# Comment this block out if you are not using SSL yet
server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt ACME challenge through without redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

