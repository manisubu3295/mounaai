# ─── Proxy rules (shared between HTTP and HTTPS server blocks) ────────────────

# Common proxy headers
proxy_http_version  1.1;
proxy_set_header    Host               $host;
proxy_set_header    X-Real-IP          $remote_addr;
proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
proxy_set_header    X-Forwarded-Proto  $scheme;
proxy_set_header    Connection         "";
proxy_read_timeout  60s;
proxy_send_timeout  60s;

# ── API routes — rate-limited ─────────────────────────────────────────────────
location /api/ {
    limit_req zone=api_limit burst=20 nodelay;
    limit_req_status 429;

    proxy_pass http://pocketcomputer_web;

    # Increase timeout for long-running LLM calls
    proxy_read_timeout 120s;
}

# ── Static assets — aggressive cache headers, light rate limit ────────────────
location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    limit_req zone=web_limit burst=60 nodelay;

    proxy_pass http://pocketcomputer_web;

    # Instruct browsers/CDN to cache immutable assets for 1 year
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Vary "Accept-Encoding";
}

# ── SPA — everything else ─────────────────────────────────────────────────────
location / {
    limit_req zone=web_limit burst=60 nodelay;
    proxy_pass http://pocketcomputer_web;
}
